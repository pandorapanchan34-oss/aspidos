<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aspidos v1.7 - PANDORA SHIELD</title>
  <style>
    body {
      margin: 0; padding: 0;
      background: #05050f;
      color: #00ffcc;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
    }
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(5,5,15,0.95);
      padding: 14px 25px;
      z-index: 200;
      border-bottom: 2px solid #00ffcc44;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 16px; letter-spacing: 1px;
    }
    canvas { display: block; }
    .info {
      position: fixed; top: 80px; left: 25px;
      background: rgba(0,0,0,0.7); padding: 14px 18px;
      border: 1px solid #00ffcc33; border-radius: 6px;
      font-size: 13.5px; line-height: 1.5; z-index: 100;
    }
    #controls {
      position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
      background: rgba(5,5,15,0.92); padding: 12px 25px;
      border-radius: 40px; border: 1px solid #00ffcc55;
      z-index: 200; display: flex; gap: 15px;
    }
    button {
      background: transparent; color: #00ffcc; border: 2px solid #00ffcc;
      padding: 10px 22px; border-radius: 30px; cursor: pointer;
      font-weight: bold; transition: all 0.2s;
    }
    button:hover { background: #00ffcc22; transform: scale(1.05); }
    .scanline {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(transparent 50%, rgba(0,255,200,0.03) 50%);
      background-size: 100% 4px;
      pointer-events: none; z-index: 10; animation: scan 4s linear infinite;
    }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
  </style>
</head>
<body>

  <div id="header">
    <div><strong>ASPIDOS v1.7 Ω</strong>　PANDORA SYNC ACTIVE</div>
    <div id="status">STEALTH: 0.0　｜　LEVEL: NORMAL</div>
  </div>

  <div class="info" id="info">
    TICK: 0<br>
    SCORE: 0.0000<br>
    OMEGA: 1.0000<br>
    PGU: 0.0000
  </div>

  <canvas id="visualizer"></canvas>
  <div class="scanline"></div>

  <div id="controls">
    <button onclick="startNormal()">NORMAL MONITOR</button>
    <button onclick="startAttack()">ATTACK SIMULATION</button>
    <button onclick="stopAll()">PAUSE SYSTEM</button>
  </div>

  <script>
    // ====================== ここに aspidos.js の全コードを貼り付けて ======================
    // （前回送った Shield クラス全部 + export const AspidosCore = Shield; の部分）
    // ===================================================================================

    const core = new AspidosCore();

    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    let w, h;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight - 60;
    }
    window.addEventListener('resize', resize);
    resize();

    let particles = [];
    let rings = [];

    function createRing(intensity) {
      rings.push({
        radius: 60,
        alpha: 1,
        speed: 0.8 + intensity * 1.5,
        color: intensity > 0.7 ? '#ff3366' : '#00ffcc'
      });
    }

    function updateUI(result) {
      // UIテキスト更新
      document.getElementById('status').textContent = 
        `STEALTH: ${result.stealth.toFixed(1)}　｜　LEVEL: ${result.level}`;
      
      document.getElementById('info').innerHTML = `
        TICK: ${result.tick}<br>
        SCORE: ${result.score}<br>
        OMEGA: ${result.omega}<br>
        PGU: ${result.pguRatio}
      `;

      // 背景クリア（残像効果）
      ctx.fillStyle = 'rgba(5, 5, 15, 0.12)';
      ctx.fillRect(0, 0, w, h);

      const cx = w / 2;
      const cy = h / 2;
      const intensity = Math.min(1.8, result.score * 2.2);

      // 大型シールドリング（複数層）
      ctx.lineWidth = 4 + intensity * 12;
      for (let i = 0; i < 3; i++) {
        ctx.strokeStyle = i === 1 ? result.level === 'CRITICAL' ? '#ff3366' : '#00ffcc' : '#00ffcc33';
        ctx.globalAlpha = 0.9 - i * 0.25;
        ctx.beginPath();
        ctx.arc(cx, cy, 110 + result.omega * 85 + i * 35, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // 回転リング
      rings.forEach((r, i) => {
        r.radius += r.speed;
        r.alpha -= 0.018;
        ctx.strokeStyle = r.color;
        ctx.globalAlpha = r.alpha;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(cx, cy, r.radius, 0, Math.PI * 2);
        ctx.stroke();
      });
      rings = rings.filter(r => r.alpha > 0.05);

      // 粒子システム（より派手）
      if (Math.random() < 0.65 + intensity * 0.8) {
        for (let i = 0; i < 3; i++) {
          particles.push({
            x: cx + (Math.random() - 0.5) * 280,
            y: cy + (Math.random() - 0.5) * 280,
            vx: (Math.random() - 0.5) * (6 + intensity * 4),
            vy: (Math.random() - 0.5) * (6 + intensity * 4),
            life: 55 + Math.random() * 45,
            size: 2.5 + Math.random() * 3,
            color: result.level === 'CRITICAL' ? '#ff6699' : (Math.random() > 0.5 ? '#00ffcc' : '#aaffff')
          });
        }
      }

      // 粒子描画
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.975;
        p.vy *= 0.975;
        p.life -= 1;

        ctx.globalAlpha = p.life / 70;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);

        // たまに光の線
        if (p.life % 8 === 0 && Math.random() < 0.3) {
          ctx.strokeStyle = p.color;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(p.x, p.y);
          ctx.stroke();
        }

        if (p.life <= 0) particles.splice(i, 1);
      }
      ctx.globalAlpha = 1.0;

      // 強度が高いときにリング追加
      if (intensity > 0.6 && Math.random() < 0.4) createRing(intensity);
    }

    // コントロール
    let timer = null;

    window.startNormal = () => {
      stopAll();
      timer = setInterval(() => {
        const r = core.step(Math.random() * 0.65);
        updateUI(r);
      }, 220);
    };

    window.startAttack = () => {
      stopAll();
      timer = setInterval(() => {
        for (let i = 0; i < 14; i++) {
          const r = core.step(0.68 + Math.random() * 0.62, { penetration: 0.17 + Math.random() * 0.15 });
          updateUI(r);
        }
      }, 140);
    };

    window.stopAll = () => {
      if (timer) clearInterval(timer);
      timer = null;
    };

    // スタート
    setTimeout(() => {
      startNormal();
      // 最初にリングを少し出す
      for (let i = 0; i < 5; i++) setTimeout(() => createRing(0.6), i * 180);
    }, 400);

    console.log('%cAspidos v1.7 - Enhanced Visualizer LOADED 🔥', 'color:#00ffcc; font-size:15px; font-weight:bold;');
  </script>
</body>
</html>
