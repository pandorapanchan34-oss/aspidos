<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aspidos v1.7 - PANDORA SHIELD</title>
  <style>
    body { margin:0; padding:0; background:#05050f; color:#00ffcc; font-family:'Courier New',monospace; overflow:hidden; height:100vh; }
    #header { position:fixed; top:0; left:0; right:0; background:rgba(5,5,15,0.95); padding:14px 25px; z-index:200; border-bottom:2px solid #00ffcc44; display:flex; justify-content:space-between; font-size:16px; letter-spacing:0.5px; }
    canvas { display:block; }
    .info { position:fixed; top:80px; left:25px; background:rgba(0,0,0,0.75); padding:14px 18px; border:1px solid #00ffcc33; border-radius:6px; font-size:13.5px; line-height:1.5; z-index:100; }
    #controls { position:fixed; bottom:25px; left:50%; transform:translateX(-50%); background:rgba(5,5,15,0.92); padding:12px 25px; border-radius:40px; border:1px solid #00ffcc55; z-index:200; display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
    button { background:transparent; color:#00ffcc; border:2px solid #00ffcc; padding:10px 20px; border-radius:30px; cursor:pointer; font-weight:bold; transition:0.2s; }
    button:hover { background:#00ffcc22; transform:scale(1.05); }
    .scanline { position:fixed; inset:0; background:linear-gradient(transparent 50%, rgba(0,255,200,0.025) 50%); background-size:100% 4px; pointer-events:none; z-index:10; animation:scan 7s linear infinite; }
    @keyframes scan { 0% { transform:translateY(-100%); } 100% { transform:translateY(100%); } }
  </style>
</head>
<body>

  <div id="header">
    <div><strong>ASPIDOS v1.7 Ω</strong>　PANDORA SYNC ACTIVE</div>
    <div id="status">STEALTH: 0.0　｜　LEVEL: NORMAL　｜　INTEGRITY: 100%</div>
  </div>

  <div class="info" id="info">
    TICK: 0<br>SCORE: 0.0000<br>OMEGA: 1.0000<br>PGU: 0.0000
  </div>

  <canvas id="visualizer"></canvas>
  <div class="scanline"></div>

  <div id="controls">
    <button onclick="startNormal()">Normal Monitor</button>
    <button onclick="startSpike()">Spike Attack</button>
    <button onclick="startBurst()">Burst Flood</button>
    <button onclick="startStealth()">Stealth Probe</button>
    <button onclick="stopAll()">Pause</button>
  </div>

  <script type="module">
  import { AspidosCore } from '../src/aspidos.js';

  const core = new AspidosCore();

  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight - 70;
  }
  window.addEventListener('resize', resize);
  resize();

  let fluidParticles = [];
  let attackParticles = [];
  let burstEffects = [];
  let shieldIntegrity = 1.0;
  let currentIntensity = 0;

  const attackPatterns = {
    normal:  { color: "#88ffcc", intensity: 0.35, penetration: 0.06, count: 6 },
    spike:   { color: "#ff3366", intensity: 1.25, penetration: 0.28, count: 24 },
    burst:   { color: "#ff8800", intensity: 1.55, penetration: 0.23, count: 38 },
    stealth: { color: "#bb77ff", intensity: 0.85, penetration: 0.37, count: 17 }
  };

  function createFluidLayer(count = 48) {
    fluidParticles = [];
    for (let i = 0; i < count; i++) {
      fluidParticles.push({
        x: w/2 + (Math.random()-0.5)*250,
        y: h/2 + (Math.random()-0.5)*250,
        vx: (Math.random()-0.5)*0.8,
        vy: (Math.random()-0.5)*0.8,
        size: 1.45 + Math.random()*1.55,
        hue: 175 + Math.random()*45
      });
    }
  }

  function updateFluidCount(target) {
    while (fluidParticles.length < target && fluidParticles.length < 105) {
      fluidParticles.push({
        x: w/2 + (Math.random()-0.5)*200,
        y: h/2 + (Math.random()-0.5)*200,
        vx: (Math.random()-0.5)*0.9,
        vy: (Math.random()-0.5)*0.9,
        size: 1.5 + Math.random()*1.6,
        hue: 175 + Math.random()*45
      });
    }
    if (fluidParticles.length > target + 25) fluidParticles.splice(0, 7);
  }

  function createAttackParticles(cx, cy, pattern) {
    const p = attackPatterns[pattern];
    for (let i = 0; i < p.count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 275 + Math.random() * 160;
      attackParticles.push({
        x: cx + Math.cos(angle) * dist,
        y: cy + Math.sin(angle) * dist,
        vx: -Math.cos(angle) * (2.4 + p.intensity * 3.7),
        vy: -Math.sin(angle) * (2.4 + p.intensity * 3.7),
        life: 88,
        size: 3.5,
        color: p.color,
        hit: false
      });
    }
  }

  function createBurstEffect(cx, cy, power = 1) {
    for (let i = 0; i < 20 + power * 13; i++) {
      const angle = Math.random() * Math.PI * 2;
      burstEffects.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * (1.8 + Math.random() * 5),
        vy: Math.sin(angle) * (1.8 + Math.random() * 5),
        life: 30 + Math.random() * 32,
        size: 2 + Math.random() * 2,
        hue: Math.random() > 0.5 ? 190 : 330
      });
    }
  }

  // 本体描画（サイズほぼ固定 + グロー半分以下）
  function drawCore(cx, cy, result) {
    const pulse = Math.sin(Date.now() / 220) * 0.06 + 1.0;
    const coreSize = 16 + result.omega * 3.5;   // omegaの影響を大幅に弱く

    // 控えめなグロー（半分以下）
    ctx.save();
    ctx.globalAlpha = 0.22 + shieldIntegrity * 0.18;   // かなり抑えめ
    const grad = ctx.createRadialGradient(cx, cy, coreSize * 0.8, cx, cy, coreSize * 4.5);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.6, '#88eeff');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, coreSize * 4.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // 本体
    ctx.fillStyle = '#bbffff';
    ctx.beginPath();
    ctx.arc(cx, cy, coreSize * pulse, 0, Math.PI * 2);
    ctx.fill();

    // 中心の強い光点
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(cx, cy, 6.5, 0, Math.PI * 2);
    ctx.fill();
  }

  function updateUI(result) {
    currentIntensity = Math.min(2.0, result.score * 2.1);

    document.getElementById('status').textContent = 
      `STEALTH: ${result.stealth.toFixed(1)}　｜　LEVEL: ${result.level}　｜　INTEGRITY: ${(shieldIntegrity*100).toFixed(0)}%`;

    document.getElementById('info').innerHTML = `
      TICK: ${result.tick}<br>
      SCORE: ${result.score}<br>
      OMEGA: ${result.omega}<br>
      PGU: ${result.pguRatio}
    `;

    ctx.fillStyle = 'rgba(3,3,12,0.14)';
    ctx.fillRect(0, 0, w, h);

    const cx = w / 2;
    const cy = h / 2;

    const targetFluid = currentIntensity > 0.75 ? 
      Math.floor(50 + currentIntensity * 68) : 46;

    updateFluidCount(targetFluid);

    // 流体粒子
    for (let p of fluidParticles) {
      p.x += p.vx + Math.sin(Date.now()/520 + p.x) * 0.32;
      p.y += p.vy + Math.cos(Date.now()/670 + p.y) * 0.25;
      p.vx *= 0.985;
      p.vy *= 0.985;
      p.vx += (cx - p.x) * 0.00078;
      p.vy += (cy - p.y) * 0.00078;

      ctx.globalAlpha = 0.44 + Math.sin(Date.now()/410) * 0.19;
      ctx.fillStyle = `hsl(${p.hue}, 85%, 78%)`;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1.0;

    // 攻撃粒子
    for (let i = attackParticles.length - 1; i >= 0; i--) {
      const p = attackParticles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.968;
      p.vy *= 0.968;
      p.life--;

      if (Math.hypot(p.x - cx, p.y - cy) < 155 && !p.hit) {
        p.hit = true;
        p.vx *= -0.24;
        createBurstEffect(p.x, p.y, currentIntensity * 0.7);
        shieldIntegrity = Math.max(0.35, shieldIntegrity - 0.025);
      }

      if (p.life > 0) {
        ctx.globalAlpha = p.life / 105;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      } else {
        attackParticles.splice(i, 1);
      }
    }
    ctx.globalAlpha = 1;

    // 爆散エフェクト
    for (let i = burstEffects.length - 1; i >= 0; i--) {
      const e = burstEffects[i];
      e.x += e.vx; e.y += e.vy;
      e.vx *= 0.94; e.vy *= 0.94;
      e.life--;
      ctx.globalAlpha = e.life / 50;
      ctx.fillStyle = `hsl(${e.hue}, 100%, 86%)`;
      ctx.fillRect(e.x, e.y, e.size, e.size);
      if (e.life <= 0) burstEffects.splice(i, 1);
    }
    ctx.globalAlpha = 1.0;

    // 本体描画（サイズ抑えめ）
    drawCore(cx, cy, result);

    shieldIntegrity = Math.min(1.0, shieldIntegrity + 0.0039);
  }

  let timer = null;

  window.startNormal = () => {
    stopAll();
    timer = setInterval(() => {
      const r = core.step(Math.random() * 0.56);
      updateUI(r);
    }, 230);
  };

  window.startAttack = (type = "spike") => {
    stopAll();
    const pat = attackPatterns[type];
    timer = setInterval(() => {
      for (let i = 0; i < 8; i++) {
        core.step(0.67 + Math.random() * pat.intensity, { penetration: pat.penetration });
      }
      updateUI(core.step(0.8));
      createAttackParticles(w/2, h/2, type);
    }, 165);
  };

  window.stopAll = () => {
    if (timer) clearInterval(timer);
    timer = null;
  };

  window.startSpike   = () => startAttack("spike");
  window.startBurst   = () => startAttack("burst");
  window.startStealth = () => startAttack("stealth");

  setTimeout(() => {
    createFluidLayer(46);
    startNormal();
  }, 200);

  console.log('%cAspidos - 本体サイズ固定＋グロー控えめ版', 'color:#aaffff');
</script>
   

  
  
</body>
</html>
