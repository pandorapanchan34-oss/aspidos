<div id="visualizer">
    <div id="cliff-msg">CLIFF DETECTION</div>
</div>

<script type="module">
// 🔗 ドッキング！ (パスはGitHub構成に合わせて修正)
import { Shield as AspidosCore } from '../src/aspidos.js';

const core = new AspidosCore();

// 🎨 updateUI: コアの出力を器に流し込む（ドッキングの要）
function updateUI(r) {
  // 数値の投影
  document.getElementById('omega-val').innerText = r.omega;
  document.getElementById('stealth-val').innerText = r.stealth;

  // 物理的描画（バーの生成）
  const visualizer = document.getElementById('visualizer');
  const bar = document.createElement('div');
  bar.className = 'bar';
  bar.style.height = `${r.score * 70}%`;
  bar.style.left = `${Math.random() * 95}%`;
  bar.style.backgroundColor = r.level === 'CRITICAL' ? '#ff0055' : '#00ff88';
  
  visualizer.appendChild(bar);
  if (visualizer.children.length > 50) visualizer.removeChild(visualizer.children[1]);
}

// 🚀 シミュレーター：コアを叩く
function runStep(v, penetration = 0) {
  const r = core.step(v, penetration ? { penetration } : {});
  updateUI(r); // ここで「心臓」と「器」が繋がる！
}

// --- 以下、startNormal / startAttack 等の制御ロジック ---
</script>
