<script type="module">
  import { AspidosCore } from '../src/aspidos.js';

  const core = new AspidosCore();

  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight - 70;
  }
  window.addEventListener('resize', resize);
  resize();

  let fluidParticles = [];      // 常時流動している防御流体
  let attackParticles = [];     //  incoming 攻撃
  let burstEffects = [];        // 防御成功時の大爆発（千本桜風）

  const attackPatterns = {
    normal:  { color: "#88ffcc", intensity: 0.4, penetration: 0.08, count: 7 },
    spike:   { color: "#ff3366", intensity: 1.3, penetration: 0.30, count: 25 },
    burst:   { color: "#ff8800", intensity: 1.6, penetration: 0.25, count: 40 },
    stealth: { color: "#bb77ff", intensity: 0.9, penetration: 0.40, count: 18 }
  };

  function createFluidLayer() {
    for (let i = 0; i < 180; i++) {
      fluidParticles.push({
        x: w/2 + (Math.random()-0.5)*280,
        y: h/2 + (Math.random()-0.5)*280,
        vx: (Math.random()-0.5)*1.2,
        vy: (Math.random()-0.5)*1.2,
        life: 9999, // 常時存在
        size: 1.8 + Math.random()*2.2,
        hue: 180 + Math.random()*40   // 青〜シアン寄り
      });
    }
  }

  function createAttackParticles(cx, cy, pattern) {
    const p = attackPatterns[pattern];
    for (let i = 0; i < p.count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 220 + Math.random() * 160;
      attackParticles.push({
        x: cx + Math.cos(angle) * dist,
        y: cy + Math.sin(angle) * dist,
        vx: -Math.cos(angle) * (4 + p.intensity * 7),
        vy: -Math.sin(angle) * (4 + p.intensity * 7),
        life: 110,
        size: 3.5,
        color: p.color,
        hit: false
      });
    }
  }

  function createBurstEffect(cx, cy, power = 1) {   // 千本桜風爆散
    for (let i = 0; i < 45 + power * 25; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * (5 + power * 4);
      burstEffects.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 35 + Math.random() * 45,
        size: 2.2 + Math.random() * 2.8,
        hue: Math.random() > 0.5 ? 190 : 320,   // 青 or ピンク
        alpha: 1
      });
    }
  }

  function updateUI(result) {
    document.getElementById('status').textContent = 
      `STEALTH: ${result.stealth.toFixed(1)}　｜　LEVEL: ${result.level}　｜　INTEGRITY: ${(shieldIntegrity*100).toFixed(0)}%`;

    document.getElementById('info').innerHTML = `
      TICK: ${result.tick}<br>
      SCORE: ${result.score}<br>
      OMEGA: ${result.omega}<br>
      PGU: ${result.pguRatio}
    `;

    ctx.fillStyle = 'rgba(3,3,12,0.18)';
    ctx.fillRect(0, 0, w, h);

    const cx = w / 2;
    const cy = h / 2;
    const intensity = Math.min(2.2, result.score * 2.8);

    // 常時流動する防御流体（千本桜の桜吹雪風）
    for (let i = 0; i < fluidParticles.length; i++) {
      const p = fluidParticles[i];
      p.x += p.vx + Math.sin(Date.now()/300 + i) * 0.6;
      p.y += p.vy + Math.cos(Date.now()/400 + i) * 0.5;
      p.vx *= 0.985;
      p.vy *= 0.985;

      // 軽く中心に引き寄せ
      p.vx += (cx - p.x) * 0.0008;
      p.vy += (cy - p.y) * 0.0008;

      ctx.globalAlpha = 0.75 + Math.sin(Date.now()/200 + i) * 0.25;
      ctx.fillStyle = `hsl(${p.hue}, 90%, 85%)`;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1.0;

    // 攻撃粒子
    for (let i = attackParticles.length - 1; i >= 0; i--) {
      const p = attackParticles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.96; p.vy *= 0.96;
      p.life--;

      const dist = Math.hypot(p.x - cx, p.y - cy);

      if (dist < 130 + result.omega * 60 && !p.hit) {
        p.hit = true;
        p.vx *= -0.25;
        createBurstEffect(p.x, p.y, 1.3);   // 流体が攻撃を飲み込んで爆散
        shieldIntegrity = Math.max(0.4, shieldIntegrity - 0.028);
      }

      if (p.life > 0) {
        ctx.globalAlpha = p.life / 120;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      } else {
        attackParticles.splice(i, 1);
      }
    }
    ctx.globalAlpha = 1;

    // 防御爆散エフェクト（千本桜風）
    for (let i = burstEffects.length - 1; i >= 0; i--) {
      const e = burstEffects[i];
      e.x += e.vx; e.y += e.vy;
      e.vx *= 0.94; e.vy *= 0.94;
      e.life--; e.alpha = e.life / 60;

      ctx.globalAlpha = e.alpha;
      ctx.fillStyle = `hsl(${e.hue}, 100%, 88%)`;
      ctx.fillRect(e.x, e.y, e.size, e.size);
      if (e.life <= 0) burstEffects.splice(i, 1);
    }
    ctx.globalAlpha = 1.0;

    shieldIntegrity = Math.min(1.0, shieldIntegrity + 0.0035);
  }

  let timer = null;
  let shieldIntegrity = 1.0;

  // 初期流体生成
  setTimeout(() => createFluidLayer(), 100);

  window.startNormal = () => { /* ... 省略せずに前のコードと同じく実装 ... */ };
  // （startAttack, stopAll なども同様に前のコードからコピーして調整）

  console.log('%cAspidos - Fluid Defense (Senbonzakura Keigō Mode) Activated', 'color:#aaffff; font-size:16px;');
</script>
