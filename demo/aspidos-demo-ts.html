<script>
  // AspidosCore (Shieldクラス) の定義はここにそのまま貼り付けてね

  const core = new AspidosCore();
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight - 70;
  }
  resize();
  window.addEventListener('resize', resize);

  let particles = [];        // 攻撃粒子
  let defenseEffects = [];   // 防御成功時のエフェクト
  let shieldIntegrity = 1.0; // 0.0 ~ 1.0 (視覚用)

  // 攻撃パターン
  const attackPatterns = {
    normal:  { name: "Normal",   color: "#00ff88", intensity: 0.4,  penetration: 0.08, count: 6 },
    spike:   { name: "Spike",    color: "#ff3366", intensity: 1.2,  penetration: 0.28, count: 18 },
    burst:   { name: "Burst",    color: "#ffaa00", intensity: 1.5,  penetration: 0.22, count: 32 },
    stealth: { name: "Stealth",  color: "#aa66ff", intensity: 0.9,  penetration: 0.38, count: 14 }
  };

  let currentAttack = "normal";

  function createAttackParticles(cx, cy, patternKey) {
    const p = attackPatterns[patternKey];
    for (let i = 0; i < p.count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 180 + Math.random() * 120;
      particles.push({
        x: cx + Math.cos(angle) * dist,
        y: cy + Math.sin(angle) * dist,
        vx: -Math.cos(angle) * (4 + p.intensity * 5),
        vy: -Math.sin(angle) * (4 + p.intensity * 5),
        life: 80,
        size: 3.5 + Math.random() * 2.5,
        color: p.color,
        pattern: patternKey,
        hit: false
      });
    }
  }

  function createDefenseEffect(cx, cy, strength) {
    for (let i = 0; i < 18 + strength * 12; i++) {
      const angle = Math.random() * Math.PI * 2;
      defenseEffects.push({
        x: cx,
        y: cy,
        vx: Math.cos(angle) * (2 + strength * 7),
        vy: Math.sin(angle) * (2 + strength * 7),
        life: 25 + Math.random() * 35,
        color: "#88ffff",
        size: 2.5
      });
    }
  }

  function updateUI(result) {
    // UIテキスト
    document.getElementById('status').textContent = 
      `Aspidos v1.7 Ω | Stealth: ${result.stealth.toFixed(1)} | Level: ${result.level} | Integrity: ${(shieldIntegrity*100).toFixed(0)}%`;

    document.getElementById('info').innerHTML = `
      TICK: ${result.tick}<br>
      SCORE: ${result.score}<br>
      OMEGA: ${result.omega.toFixed(3)}<br>
      PGU: ${result.pguRatio.toFixed(3)}
    `;

    ctx.fillStyle = 'rgba(5, 5, 15, 0.14)';
    ctx.fillRect(0, 0, w, h);

    const cx = w / 2;
    const cy = h / 2;
    const intensity = Math.min(2.0, result.score * 2.6);

    // 常時シールド（常に表示）
    const shieldHue = result.level === 'CRITICAL' ? 0 : (shieldIntegrity < 0.6 ? 30 : 180);
    ctx.strokeStyle = `hsl(${shieldHue}, 100%, 65%)`;
    ctx.lineWidth = 7 + intensity * 9;
    ctx.globalAlpha = 0.85 + shieldIntegrity * 0.15;
    ctx.beginPath();
    ctx.arc(cx, cy, 105 + result.omega * 105, 0, Math.PI * 2);
    ctx.stroke();

    // シールドの内側グロー
    ctx.globalAlpha = 0.25;
    ctx.lineWidth = 25;
    ctx.beginPath();
    ctx.arc(cx, cy, 95 + result.omega * 60, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1.0;

    // 攻撃粒子更新 & 描画
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.life--;

      // シールドとの衝突判定（簡易）
      const dx = p.x - cx;
      const dy = p.y - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 115 + result.omega * 80 && !p.hit) {
        p.hit = true;
        p.vx *= -0.3;   // 跳ね返り
        p.vy *= -0.3;
        shieldIntegrity = Math.max(0.3, shieldIntegrity - 0.04); // 少し削られる
        createDefenseEffect(cx, cy, 0.8); // 防御エフェクト発生
      }

      if (p.life > 0) {
        ctx.globalAlpha = p.life / 90;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      } else {
        particles.splice(i, 1);
      }
    }
    ctx.globalAlpha = 1.0;

    // 防御エフェクト
    for (let i = defenseEffects.length - 1; i >= 0; i--) {
      const e = defenseEffects[i];
      e.x += e.vx;
      e.y += e.vy;
      e.vx *= 0.94;
      e.vy *= 0.94;
      e.life--;

      ctx.globalAlpha = e.life / 45;
      ctx.fillStyle = e.color;
      ctx.fillRect(e.x, e.y, e.size, e.size);

      if (e.life <= 0) defenseEffects.splice(i, 1);
    }
    ctx.globalAlpha = 1.0;

    // シールド回復（常に少しずつ）
    shieldIntegrity = Math.min(1.0, shieldIntegrity + 0.003);
  }

  // ==================== コントロール ====================
  let timer = null;

  window.startNormal = () => {
    stopAll();
    currentAttack = "normal";
    timer = setInterval(() => {
      const r = core.step(Math.random() * 0.55);
      updateUI(r);
    }, 220);
  };

  window.startAttack = (pattern = "spike") => {
    stopAll();
    currentAttack = pattern;
    const pat = attackPatterns[pattern];
    timer = setInterval(() => {
      for (let i = 0; i < 8; i++) {
        const r = core.step(0.6 + Math.random() * pat.intensity, { penetration: pat.penetration });
        updateUI(r);
      }
      createAttackParticles(w/2, h/2, pattern);   // 視覚的な攻撃発生
    }, 180);
  };

  window.stopAll = () => {
    if (timer) clearInterval(timer);
    timer = null;
  };

  // ボタン用
  window.startSpike = () => startAttack("spike");
  window.startBurst = () => startAttack("burst");
  window.startStealth = () => startAttack("stealth");

  // 初期起動
  setTimeout(() => startNormal(), 300);

  console.log('%cAspidos v1.7 - Always Active Defense System LOADED', 'color:#00ffcc; font-size:16px;');
</script>
