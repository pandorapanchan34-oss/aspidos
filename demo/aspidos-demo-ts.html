<script type="module">
import { AspidosCore } from '../src/aspidos-core.js';

const core = new AspidosCore();

let timer = null;

function runStep(v, penetration = 0) {
  const r = core.step(v, penetration ? { penetration } : {});
  updateUI(r);
}

// --- Normal ---
window.startNormal = () => {
  stopAll();
  timer = setInterval(() => {
    runStep(Math.random() * 0.6);
  }, 280);
};

// --- Attack ---
window.startAttack = () => {
  stopAll();
  timer = setInterval(() => {
    for (let i = 0; i < 12; i++) {
      runStep(
        0.65 + Math.random() * 0.55,
        0.18 + Math.random() * 0.12
      );
    }
  }, 160);
};

window.stopAll = () => {
  if (timer) clearInterval(timer);
  timer = null;
};
</script>
